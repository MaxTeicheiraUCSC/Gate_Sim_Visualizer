<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GATE Geometry Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #0a0a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: #111128;
      border-bottom: 1px solid #2a2a4a;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 16px;
      color: #8888ff;
      white-space: nowrap;
    }
    header .subtitle {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
    }

    /* Input bar */
    .input-bar {
      background: #111128;
      border-bottom: 1px solid #2a2a4a;
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .input-bar label {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }
    .input-bar input[type="text"] {
      flex: 1;
      min-width: 200px;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
    }
    .input-bar input[type="number"] {
      width: 70px;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
    }
    button {
      background: #3333aa;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    button:hover { background: #4444cc; }
    button:active { background: #2222aa; }
    button.secondary {
      background: #2a2a4a;
    }
    button.secondary:hover { background: #3a3a5a; }

    /* Main layout */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #111128;
      border-right: 1px solid #2a2a4a;
      overflow-y: auto;
      padding: 12px;
      flex-shrink: 0;
    }
    .sidebar h3 {
      font-size: 12px;
      color: #8888ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      margin-top: 12px;
    }
    .sidebar h3:first-child { margin-top: 0; }
    .vol-entry {
      font-size: 12px;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .vol-swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      vertical-align: middle;
      margin-right: 4px;
    }
    .vol-entry small { color: #888; }

    /* Script paste area */
    .paste-section {
      border-top: 1px solid #2a2a4a;
      padding-top: 12px;
      margin-top: 12px;
    }
    .paste-section textarea {
      width: 100%;
      height: 120px;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      resize: vertical;
    }
    .paste-section button {
      margin-top: 6px;
      width: 100%;
    }

    /* Canvas */
    #canvas-container {
      flex: 1;
      position: relative;
    }
    #viewport {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Status bar */
    .status-bar {
      background: #111128;
      border-top: 1px solid #2a2a4a;
      padding: 4px 16px;
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111128; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>GATE Geometry Viewer</h1>
    <span class="subtitle">3D visualization of OpenGATE simulation scripts with ray-traced attenuation</span>
  </header>

  <div class="input-bar">
    <label>Script URL:</label>
    <input type="text" id="url-input" placeholder="Paste URL to raw Python GATE script...">
    <button id="load-url">Load URL</button>
    <label>Resolution:</label>
    <input type="number" id="resolution" value="256" min="64" max="1024" step="64">
    <button id="toggle-projection" class="secondary">Hide Projection</button>
  </div>

  <div class="main">
    <div class="sidebar">
      <div id="info-panel">
        <h3>Geometry</h3>
        <p style="font-size:12px;color:#666;">Load a script to view geometry.</p>
      </div>
      <div class="paste-section">
        <h3>Paste Script</h3>
        <textarea id="script-input" placeholder="Paste GATE Python script here..."></textarea>
        <button id="load-script">Parse Script</button>
      </div>
    </div>
    <div id="canvas-container">
      <canvas id="viewport"></canvas>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">Loading...</span>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
