name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout visualizer
        uses: actions/checkout@v4

      - name: Fetch GATE simulation script
        run: |
          mkdir -p scripts
          curl -fsSL \
            https://raw.githubusercontent.com/maxteicheiraUCSC/gate_sim/main/czt_slit_simulation_cluster.py \
            -o scripts/czt_slit_simulation_cluster.py
          echo "Downloaded simulation script:"
          head -5 scripts/czt_slit_simulation_cluster.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
